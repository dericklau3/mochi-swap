
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MochiSwap · V2/V3 DEX Prototype</title>
  <style>
    :root {
      --bg: #fbf7ff;
      --surface: #ffffff;
      --surface-warm: #f6efff;
      --fg: #25104f;
      --fg-2: #4d3a75;
      --muted: #7c6c9b;
      --meta: #8b5cf6;
      --border: #e6d8f7;
      --border-soft: #f0e6fb;
      --accent: #8b5cf6;
      --accent-on: #ffffff;
      --accent-hover: color-mix(in oklab, var(--accent), #ef61b7 16%);
      --accent-active: color-mix(in oklab, var(--accent), #25104f 18%);
      --success: #16b8a6;
      --warn: #d97706;
      --danger: #dc2626;
      --font-display: Inter, system-ui, sans-serif;
      --font-body: Inter, system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 18px;
      --text-xl: 24px;
      --text-2xl: 34px;
      --text-3xl: 48px;
      --text-4xl: 64px;
      --leading-body: 1.52;
      --leading-tight: 1.08;
      --tracking-display: -0.018em;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --section-y-desktop: 96px;
      --section-y-tablet: 68px;
      --section-y-phone: 48px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-pill: 9999px;
      --elev-flat: none;
      --elev-ring: 0 0 0 1px var(--border);
      --elev-raised: 0 24px 64px rgba(65, 24, 132, 0.14);
      --focus-ring: 0 0 0 4px rgba(139, 92, 246, 0.24);
      --motion-fast: 150ms;
      --motion-base: 230ms;
      --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      --container-max: 1240px;
      --container-gutter-desktop: 36px;
      --container-gutter-tablet: 24px;
      --container-gutter-phone: 16px;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% -12%, color-mix(in oklab, #ef61b7, transparent 78%), transparent 34rem),
        radial-gradient(circle at 84% 4%, color-mix(in oklab, #28d8c6, transparent 80%), transparent 28rem),
        linear-gradient(180deg, var(--bg), color-mix(in oklab, var(--surface-warm), var(--bg) 54%));
      color: var(--fg);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .56; }
    h1, h2, h3, h4, p { margin: 0; }
    h1, h2, h3, h4 { font-family: var(--font-display); letter-spacing: var(--tracking-display); text-wrap: balance; }
    p { text-wrap: pretty; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 264px minmax(0, 1fr); }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 20;
      border-right: 1px solid var(--border);
      background:
        linear-gradient(180deg, color-mix(in oklab, var(--surface), #f6efff 24%), color-mix(in oklab, var(--surface), transparent 2%));
      backdrop-filter: blur(16px);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }
    .brand { display: inline-flex; align-items: center; gap: var(--space-3); font-weight: 900; letter-spacing: -0.035em; }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: block;
      border-radius: var(--radius-lg);
      object-fit: cover;
      background: var(--surface);
      box-shadow: 0 0 0 1px color-mix(in oklab, #8b5cf6, transparent 68%), 0 10px 24px rgba(139, 92, 246, 0.16);
    }
    .brand-name {
      font-size: 24px;
      line-height: 1;
      background: linear-gradient(90deg, #25104f 0%, #5b2cc9 48%, #8b5cf6 68%, #ef61b7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-tabs { display: grid; gap: var(--space-2); }
    .nav-tab {
      appearance: none;
      border: 0;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--muted);
      padding: 12px 14px;
      text-align: left;
      font-weight: 800;
      box-shadow: none;
      transition: background var(--motion-fast) var(--ease-standard), color var(--motion-fast) var(--ease-standard), box-shadow var(--motion-fast) var(--ease-standard);
    }
    .nav-tab:hover { color: var(--fg); background: color-mix(in oklab, var(--surface-warm), transparent 34%); }
    .nav-tab.is-active { color: #7c3aed; background: linear-gradient(90deg, color-mix(in oklab, #8b5cf6, transparent 88%), color-mix(in oklab, #ef61b7, transparent 92%)); box-shadow: inset 0 0 0 1px color-mix(in oklab, #8b5cf6, transparent 66%); }
    .app-actions {
      position: fixed;
      top: 20px;
      right: var(--container-gutter-desktop);
      z-index: 25;
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
    }
    .network-pill, .icon-btn, .btn {
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface), #fbf7ff 24%);
      color: var(--fg);
      border-radius: var(--radius-md);
      transition: transform var(--motion-fast) var(--ease-standard), border-color var(--motion-fast) var(--ease-standard), background var(--motion-fast) var(--ease-standard), color var(--motion-fast) var(--ease-standard);
    }
    .network-pill { display: inline-flex; align-items: center; gap: var(--space-2); padding: 9px 12px; font-size: var(--text-sm); }
    .status-dot { width: 8px; height: 8px; border-radius: var(--radius-pill); background: #28d8c6; box-shadow: 0 0 0 3px color-mix(in oklab, #28d8c6, transparent 78%); }
    .icon-btn { width: 40px; height: 40px; display: grid; place-items: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); min-height: 42px; padding: 10px 16px; font-weight: 700; }
    .btn:hover, .icon-btn:hover, .network-pill:hover { border-color: color-mix(in oklab, var(--accent), var(--border) 48%); }
    .btn:active, .icon-btn:active, .network-pill:active { transform: translateY(1px); }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6 0%, #ef61b7 100%); color: var(--accent-on); border-color: color-mix(in oklab, #8b5cf6, #ef61b7 30%); box-shadow: 0 12px 28px rgba(139, 92, 246, 0.24); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent-hover) 0%, #f56fbd 100%); border-color: var(--accent-hover); box-shadow: 0 14px 32px rgba(139, 92, 246, 0.30); }
    .btn-primary:active { background: linear-gradient(135deg, var(--accent-active) 0%, #cf4fa0 100%); }
    .btn-soft { background: color-mix(in oklab, var(--surface-warm), var(--surface) 36%); }
    .btn-danger { color: var(--danger); }
    .btn-wide { width: 100%; min-height: 52px; border-radius: var(--radius-lg); font-size: var(--text-base); }
    .liquidity-action-btn {
      width: 42px;
      min-width: 42px;
      padding-inline: 0;
      font-size: 20px;
      line-height: 1;
      background: color-mix(in oklab, var(--surface-warm), var(--surface) 36%);
    }

    .mobile-bottom-nav { display: none; }
    .content-shell { min-width: 0; }
    .page {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 92px var(--container-gutter-desktop) var(--section-y-tablet);
    }
    .page-kicker { color: var(--meta); font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; }
    .page-title { margin-top: var(--space-2); font-size: clamp(var(--text-2xl), 4vw, var(--text-3xl)); line-height: var(--leading-tight); }
    .page-copy { margin-top: var(--space-3); color: var(--fg-2); max-width: 62ch; }
    .row { display: flex; align-items: center; gap: var(--space-3); }

    .dex-layout {
      display: grid;
      grid-template-columns: minmax(420px, 480px);
      justify-content: center;
      align-items: start;
    }
    .pool-layout {
      grid-template-columns: minmax(680px, 860px);
    }
    .trade-card, .side-panel, .pool-card, .modal-card {
      background: color-mix(in oklab, var(--surface), #fff8fe 18%);
      border: 1px solid color-mix(in oklab, var(--border), #ef61b7 12%);
      border-radius: 28px;
      box-shadow: var(--elev-raised);
    }
    .trade-card { padding: var(--space-5); max-width: 480px; width: 100%; justify-self: center; }
    .pool-shell { max-width: 860px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-4); }
    .card-title { font-size: var(--text-xl); line-height: 1.18; }
    .card-subtitle { color: var(--muted); font-size: var(--text-sm); margin-top: var(--space-1); }
    .segmented { display: inline-flex; padding: var(--space-1); border-radius: var(--radius-pill); background: var(--surface-warm); border: 1px solid var(--border-soft); }
    .segmented button { border: 0; background: transparent; color: var(--muted); border-radius: var(--radius-pill); padding: 7px 11px; font-size: var(--text-sm); }
    .segmented button.is-active { background: var(--surface); color: var(--fg); box-shadow: var(--elev-ring); }

    .token-box {
      border: 1px solid var(--border-soft);
      border-radius: 22px;
      background: linear-gradient(180deg, color-mix(in oklab, var(--surface-warm), var(--surface) 34%), color-mix(in oklab, var(--surface), #fff1fb 28%));
      padding: var(--space-4);
    }
    .token-meta { display: flex; justify-content: space-between; align-items: center; gap: var(--space-4); color: var(--muted); font-size: var(--text-sm); margin-bottom: var(--space-3); }
    .token-row { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: var(--space-4); align-items: center; }
    .token-select {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: color-mix(in oklab, var(--surface), #fbf7ff 18%);
      padding: 8px 11px;
      min-width: 128px;
      font-weight: 800;
    }
    .coin { width: 28px; height: 28px; border-radius: var(--radius-pill); display: grid; place-items: center; background: linear-gradient(135deg, #8b5cf6, #28d8c6); color: var(--accent-on); font-family: var(--font-mono); font-size: var(--text-xs); box-shadow: 0 6px 14px rgba(139, 92, 246, 0.18); }
    .coin.muted { background: var(--surface-warm); color: var(--muted); border: 1px solid var(--border); }
    .amount-input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--fg);
      text-align: right;
      font-size: var(--text-2xl);
      font-weight: 800;
      letter-spacing: var(--tracking-display);
      font-variant-numeric: tabular-nums;
    }
    .max-btn { border: 0; border-radius: var(--radius-pill); padding: 4px 8px; background: color-mix(in oklab, var(--accent), transparent 88%); color: var(--accent); font-weight: 800; font-size: var(--text-xs); }
    .swap-arrow { width: 42px; height: 42px; margin: -4px auto; position: relative; z-index: 1; border-radius: 15px; border: 4px solid var(--surface); background: linear-gradient(135deg, color-mix(in oklab, #8b5cf6, transparent 84%), color-mix(in oklab, #28d8c6, transparent 82%)); color: var(--accent); display: grid; place-items: center; }
    .info-list { display: grid; gap: var(--space-2); margin: var(--space-4) 0; }
    .info-line { display: flex; justify-content: space-between; gap: var(--space-4); color: var(--muted); font-size: var(--text-sm); }
    .info-line strong { color: var(--fg); font-family: var(--font-mono); font-weight: 700; }
    .price-info-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-2);
      text-align: right;
    }
    .fees-info-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-3);
      text-align: right;
    }
    .collect-fees-btn {
      min-height: 32px;
      padding: 6px 10px;
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      white-space: nowrap;
    }
    .price-toggle-btn {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-pill);
      background: color-mix(in oklab, var(--surface-warm), var(--surface) 36%);
      color: var(--accent);
      padding: 0;
    }
    .price-toggle-btn:hover {
      border-color: color-mix(in oklab, var(--accent), var(--border) 48%);
      background: color-mix(in oklab, var(--accent), transparent 90%);
    }
    .notice { border: 1px solid var(--border); background: color-mix(in oklab, var(--surface-warm), var(--surface) 28%); color: var(--fg-2); border-radius: var(--radius-lg); padding: var(--space-4); font-size: var(--text-sm); }
    .notice.warn { border-color: color-mix(in oklab, var(--warn), var(--border) 58%); color: var(--warn); }
    .notice.danger { border-color: color-mix(in oklab, var(--danger), var(--border) 58%); color: var(--danger); }

    .side-panel { padding: var(--space-5); box-shadow: var(--elev-ring); }
    .state-grid { display: grid; gap: var(--space-3); }
    .state-row { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); padding: var(--space-3); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); background: var(--surface); }
    .state-label { display: flex; align-items: center; gap: var(--space-2); color: var(--fg-2); font-size: var(--text-sm); }
    .state-value { color: var(--fg); font-family: var(--font-mono); font-size: var(--text-sm); }
    .tiny-dot { width: 7px; height: 7px; border-radius: var(--radius-pill); background: var(--muted); }
    .tiny-dot.ok { background: var(--success); }
    .tiny-dot.warn { background: var(--warn); }
    .tiny-dot.danger { background: var(--danger); }

    .pool-list { display: grid; gap: var(--space-4); }
    .pool-card { padding: var(--space-4); box-shadow: var(--elev-ring); }
    .pool-card:hover { border-color: color-mix(in oklab, var(--accent), var(--border) 48%); box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent), transparent 72%), 0 14px 34px rgba(139, 92, 246, 0.10); }
    .pool-actions { display: flex; justify-content: flex-end; gap: var(--space-3); flex-wrap: wrap; }
    .pool-row { display: grid; grid-template-columns: minmax(220px, 1.4fr) minmax(120px, .7fr) minmax(140px, .8fr); align-items: center; gap: var(--space-4); }
    .pool-row.import-result { grid-template-columns: minmax(180px, 1.4fr) minmax(112px, .7fr) minmax(128px, .8fr) auto; }
    .pair-link { border: 0; background: transparent; color: var(--fg); padding: 0; text-align: left; display: flex; align-items: center; gap: var(--space-3); min-width: 0; }
    .pair-link:hover h3 { color: var(--accent); }
    .pool-row-label { display: block; color: var(--muted); font-size: var(--text-xs); margin-bottom: 2px; }
    .pool-row-value { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 800; }
    .pair-head { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-4); }
    .pair-icons { display: flex; align-items: center; }
    .pair-icons .coin + .coin { margin-left: -8px; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-3); margin-top: var(--space-4); }
    .metric { padding: var(--space-3); border-radius: var(--radius-lg); background: linear-gradient(180deg, color-mix(in oklab, var(--surface-warm), var(--surface) 26%), color-mix(in oklab, var(--surface), #fff1fb 20%)); }
    .metric span { display: block; color: var(--muted); font-size: var(--text-xs); }
    .metric strong { display: block; margin-top: var(--space-1); font-family: var(--font-mono); font-size: var(--text-sm); }
    .pair-actions { display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-4); }
    .empty-state { text-align: center; padding: var(--space-8) var(--space-5); border: 1px dashed color-mix(in oklab, var(--accent), var(--border) 48%); border-radius: 24px; background: linear-gradient(180deg, color-mix(in oklab, var(--surface), #f6efff 28%), var(--surface)); }
    .detail-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-4); }
    .back-icon { border-radius: var(--radius-pill); background: color-mix(in oklab, var(--surface-warm), var(--surface) 32%); }
    .back-icon:hover { background: var(--surface); color: var(--accent); }
    .product-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-4); }
    .product-card { padding: var(--space-4); border: 1px solid var(--border-soft); border-radius: 22px; background: linear-gradient(180deg, color-mix(in oklab, var(--surface), #fff1fb 18%), var(--surface)); box-shadow: var(--elev-ring); }
    .product-card-head { display: flex; justify-content: space-between; gap: var(--space-4); align-items: flex-start; margin-bottom: var(--space-4); }
    .apr-badge { display: inline-flex; align-items: center; border-radius: var(--radius-pill); padding: 6px 10px; background: color-mix(in oklab, #28d8c6, transparent 84%); color: color-mix(in oklab, #0f766e, var(--fg) 18%); font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 900; }
    .stake-panel { display: grid; gap: var(--space-3); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border-soft); }
    .proposal-card { padding: var(--space-4); border: 1px solid var(--border-soft); border-radius: 22px; background: var(--surface); box-shadow: var(--elev-ring); }
    .proposal-card + .proposal-card { margin-top: var(--space-3); }
    .proposal-top { display: flex; justify-content: space-between; gap: var(--space-4); align-items: flex-start; }
    .vote-bars { display: grid; gap: var(--space-2); margin: var(--space-4) 0; }
    .vote-bar { display: grid; grid-template-columns: 72px 1fr 56px; align-items: center; gap: var(--space-3); color: var(--muted); font-size: var(--text-sm); }
    .vote-track { height: 8px; border-radius: var(--radius-pill); background: var(--surface-warm); overflow: hidden; }
    .vote-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #8b5cf6, #ef61b7); }
    .vote-fill.against { background: linear-gradient(90deg, #dc2626, #ef61b7); }
    .vote-fill.abstain { background: linear-gradient(90deg, #7c6c9b, #c4b5fd); }
    .status-chip { display: inline-flex; align-items: center; border-radius: var(--radius-pill); padding: 6px 10px; background: color-mix(in oklab, var(--accent), transparent 88%); color: var(--accent); font-size: var(--text-xs); font-weight: 900; }

    .percent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-2); margin: var(--space-4) 0; }
    .percent-grid button { min-height: 42px; border: 1px solid var(--border); border-radius: var(--radius-md); background: color-mix(in oklab, var(--surface), #fbf7ff 20%); font-weight: 800; }
    .percent-grid button.is-active { border-color: var(--accent); color: var(--accent); background: color-mix(in oklab, var(--accent), transparent 91%); }
    .liquidity-percent-card {
      display: grid;
      gap: var(--space-4);
      margin: 0 0 var(--space-4);
      padding: var(--space-5);
      border: 1px solid var(--border-soft);
      border-radius: 22px;
      background: linear-gradient(180deg, color-mix(in oklab, var(--surface), #f6efff 30%), var(--surface));
      box-shadow: var(--elev-ring);
    }
    .percent-display {
      color: var(--fg);
      font-size: clamp(36px, 7vw, 44px);
      line-height: .88;
      letter-spacing: -0.04em;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }
    .drag-percent-wrap {
      position: relative;
      min-height: 34px;
      display: flex;
      align-items: center;
    }
    .drag-percent-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      border-radius: var(--radius-pill);
      transform: translateY(-50%);
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--pct), color-mix(in oklab, var(--accent), transparent 84%) var(--pct), color-mix(in oklab, var(--accent), transparent 84%) 100%);
      pointer-events: none;
    }
    .drag-percent-thumb {
      position: absolute;
      top: 50%;
      left: var(--pct);
      z-index: 1;
      width: 22px;
      height: 22px;
      border: 3px solid var(--surface);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent), transparent 38%), 0 8px 18px color-mix(in oklab, var(--accent), transparent 68%);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .drag-percent-input {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 34px;
      margin: 0;
      opacity: 0;
      cursor: grab;
    }
    .drag-percent-input:active { cursor: grabbing; }
    .drag-percent-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);

    }
    .drag-percent-actions button:hover {

    .drag-percent-actions button.is-active {

    .pool-check.price-card.is-new {
      border-color: color-mix(in oklab, var(--accent), white 28%);

    .pool-check.price-card.initial-price-card {
      display: grid;

      align-items: center;

    .pool-check strong { display: block; font-size: var(--text-sm); }

    .price-direction {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: 3px;
      border: 1px solid color-mix(in oklab, var(--accent), var(--border) 54%);

      background: color-mix(in oklab, var(--surface), transparent 10%);

    }
    .initial-price-card .price-direction button {

    .price-direction button {

      box-shadow: var(--elev-ring);

    .initial-price-line {
      display: flex;
      width: 100%;
      align-items: center;
      color: var(--muted);
      font-size: var(--text-sm);

    }
    .initial-price-input {

      outline: none;
      border: 0;
      box-shadow: none;

    .v3-token-stage { display: grid; gap: 0; }
    .range-segment { width: 100%; margin-top: var(--space-2); }

    .range-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-top: var(--space-3); }
    .range-inputs label { display: grid; gap: var(--space-2); color: var(--muted); font-size: var(--text-xs); font-weight: 800; }
    .switch-row { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); padding: var(--space-4); border: 1px solid var(--border); border-radius: var(--radius-lg); background: color-mix(in oklab, var(--surface), #fbf7ff 18%); }

    .modal-backdrop { position: fixed; inset: 0; z-index: 40; display: grid; place-items: center; padding: var(--space-4); background: color-mix(in oklab, #25104f, transparent 56%); }
